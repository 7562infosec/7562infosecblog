title: "7562 InfoSec"
subtitle: "Cybersecurity from the practitioner's lens"
description: "Cybersecurity insights, analysis, and commentary from a practitioner's perspective."
url: "https://7562infosec.net"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

minimal_mistakes_skin: "dark"

paginate: 5
paginate_path: /page:num/

author:
  name: "James Sullivan (Sully)"
  avatar: "/assets/images/bio-photo.svg"
  bio: "CISSP and Cybersecurity Practitioner"
  location: "New York Metro Area"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/7562infosec"
    - label: "zeroslop.net"
      icon: "fas fa-fw fa-bolt"
      url: "https://zeroslop.net"
    - label: "slopreport.net"
      icon: "fas fa-fw fa-flag"
      url: "https://slopreport.net"

include:
  - _pages

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
